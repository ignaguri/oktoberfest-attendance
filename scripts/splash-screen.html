<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ProstCounter Splash Screen Final</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&amp;family=Inter:wght@400;500;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#FF9F1C",
                        "background-light": "#FFBF00",
                        accent: "#FF6B00"
                    },
                    fontFamily: {
                        display: ["Fredoka", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1.5rem",
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        .bg-gradient-gold {
            background: linear-gradient(180deg, #FFD000 0%, #FF9F1C 100%);
        }
    </style>
    <style>
        body {
            min-height: 100dvh;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="antialiased font-sans bg-background-light overflow-hidden">
    <div
        class="relative flex flex-col items-center justify-between h-screen w-full max-w-md mx-auto bg-gradient-gold px-8 py-16 overflow-hidden">
        <div class="absolute top-0 left-0 right-0 flex justify-between px-4 opacity-80 pointer-events-none">
            <div class="flex space-x-1">
                <div class="w-6 h-8 bg-white/30 rounded-b-full"></div>
                <div class="w-6 h-10 bg-accent/40 rounded-b-full mt-2"></div>
                <div class="w-6 h-7 bg-white/20 rounded-b-full"></div>
            </div>
            <div class="flex space-x-1">
                <div class="w-6 h-7 bg-white/20 rounded-b-full"></div>
                <div class="w-6 h-10 bg-accent/40 rounded-b-full mt-2"></div>
                <div class="w-6 h-8 bg-white/30 rounded-b-full"></div>
            </div>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center w-full">
            <div class="relative w-full aspect-square max-w-[320px] mb-8">
                <div class="w-full h-full flex items-center justify-center">
                    <img alt="ProstCounter Clinking Mugs Logo" class="w-full h-full object-contain drop-shadow-2xl"
                        src="../apps/mobile/assets/images/logo.png" />
                </div>
            </div>
            <div class="text-center">
                <h1 class="text-6xl font-sans font-bold text-white tracking-tight drop-shadow-md">
                    ProstCounter
                </h1>
                <p class="text-2xl font-sans font-bold tracking-wide mt-2 text-white/70">
                    Prost!
                </p>
            </div>
        </div>
        <div class="w-full flex flex-col items-center pb-6">
            <p class="text-white/80 text-sm font-medium tracking-wide">
                Please drink responsibly
            </p>
        </div>
        <div
            class="absolute bottom-[-20px] left-[-20px] w-40 h-40 bg-white/10 rounded-full blur-3xl pointer-events-none">
        </div>
        <div class="absolute top-[20%] right-[-30px] w-32 h-32 bg-white/10 rounded-full blur-3xl pointer-events-none">
        </div>
    </div>

</body>

</html>
